<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&family=Space+Mono:wght@400;700&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1612;
  --ink-mid: #4a3f35;
  --ink-soft: #8a7a6e;
  --page: #faf8f5;
  --shell: #e8e2d8;
  --warm-rule: #e8e0d4;
  --red: #c0392b;
  --red-bg: #fdf2f0;
  --gold: #b8860b;
  --gold-bg: #fdfaf0;
  --green: #2d6a4f;
  --green-bg: #f0f7f4;
  --blue: #1a4a7a;
  --blue-bg: #eff6ff;
}
html { background: var(--shell); min-height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  background: var(--shell);
  line-height: 1.6;
  padding: 0;
  -webkit-font-smoothing: antialiased;
}
.shell {
  width: min(calc(100vw - 2.5in), 1840px);
  max-width: 1840px;
  min-width: 0;
  margin: 0 auto;
  padding: 8px 0 10px;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.topbar-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.tab-bar {
  display: inline-flex;
  gap: 6px;
  padding: 4px;
  border-radius: 999px;
  background: rgba(255,255,255,.55);
  border: 1px solid rgba(0,0,0,.06);
}
.tab-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 14px;
  border: none;
  background: transparent;
  border-radius: 999px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-decoration: none;
}
.tab-btn.active {
  background: var(--ink);
  color: #fff;
}
.page {
  width: 100%;
  max-width: none;
  margin: 0 auto;
  background: var(--page);
  box-shadow: 0 14px 34px rgba(26,22,18,.08);
  border: 1px solid rgba(0,0,0,.05);
  min-height: calc(100vh - 74px);
  overflow: auto;
}

/* ===== VISUAL INFOGRAPHIC LAYOUT ===== */
.summary-doc {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 56px 56px;
}

/* Header - Visual Impact */
.doc-header {
  margin-bottom: 40px;
  padding: 32px;
  background: linear-gradient(135deg, rgba(26,74,122,.04) 0%, rgba(42,106,79,.04) 100%);
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,.04);
}
.doc-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.headline {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 800;
  line-height: 1.12;
  letter-spacing: -.02em;
  color: var(--ink);
  margin-bottom: 10px;
}
.date-line {
  font-size: 13px;
  color: var(--ink-mid);
  font-weight: 500;
}

/* KPI Cards - Visual Data Viz */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.kpi-card {
  background: white;
  border-radius: 12px;
  padding: 24px 20px;
  box-shadow: 0 2px 12px rgba(26,22,18,.06);
  border: 1px solid rgba(0,0,0,.05);
  position: relative;
  overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease;
}
.kpi-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26,22,18,.1);
}
.kpi-card.hero {
  background: linear-gradient(135deg, #f0f7f4 0%, #ffffff 100%);
  border-color: rgba(42,106,79,.15);
}
.kpi-card.hero.commit {
  background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
  border-color: rgba(26,74,122,.15);
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--ink-soft);
  opacity: 0.2;
}
.kpi-card.hero::before {
  background: var(--green);
  opacity: 1;
}
.kpi-card.hero.commit::before {
  background: var(--blue);
  opacity: 1;
}
.kpi-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 12px;
}
.kpi-value {
  font-family: 'Space Mono', monospace;
  font-size: 36px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 8px;
}
.kpi-card.hero .kpi-value {
  font-size: 44px;
  color: var(--green);
}
.kpi-card.hero.commit .kpi-value {
  color: var(--blue);
}
.kpi-sub {
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 500;
}

/* Leader Note - Visual Callout */
.leader-note {
  background: rgba(26,22,18,.02);
  border-left: 4px solid var(--ink);
  padding: 28px 32px;
  margin-bottom: 40px;
  border-radius: 0 8px 8px 0;
}
.leader-note-label {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 14px;
}
.leader-note-content {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-mid);
  font-weight: 400;
}

/* Content Grid - Visual Hierarchy */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 40px;
}
.content-card {
  background: white;
  border-radius: 12px;
  padding: 28px;
  box-shadow: 0 2px 12px rgba(26,22,18,.05);
  border: 1px solid rgba(0,0,0,.04);
}
.content-card.featured {
  grid-column: 1 / -1;
  background: linear-gradient(135deg, rgba(42,106,79,.05) 0%, rgba(255,255,255,1) 100%);
  border-color: rgba(42,106,79,.12);
}
.content-card.wide {
  grid-column: 1 / -1;
}
.card-title {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--warm-rule);
}
.content-card.featured .card-title {
  color: var(--green);
  border-bottom-color: rgba(42,106,79,.2);
}

/* Lists - Visual Flow */
.visual-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.visual-list li {
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink-mid);
  padding-left: 24px;
  position: relative;
}
.visual-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  width: 6px;
  height: 6px;
  background: var(--ink-soft);
  border-radius: 50%;
}
.visual-list.numbered {
  counter-reset: item;
}
.visual-list.numbered li::before {
  content: counter(item);
  counter-increment: item;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--ink);
  color: white;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  top: 3px;
}

/* Rainmaker - Visual Data Section */
.rainmaker-section {
  background: linear-gradient(135deg, rgba(26,74,122,.04) 0%, rgba(255,255,255,1) 100%);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 40px;
  border: 1px solid rgba(26,74,122,.1);
}
.rainmaker-section .card-title {
  border-bottom-color: rgba(26,74,122,.2);
  color: var(--blue);
}
.rainmaker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
}
.rainmaker-metric {
  background: white;
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 1px 8px rgba(26,22,18,.04);
  border: 1px solid rgba(0,0,0,.04);
}
.rainmaker-metric-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 10px;
}
.rainmaker-metric-value {
  font-family: 'Space Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: var(--blue);
  line-height: 1;
  margin-bottom: 12px;
}
.rainmaker-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.rainmaker-list li {
  font-size: 12px;
  line-height: 1.6;
  color: var(--ink-mid);
  margin-bottom: 6px;
}
.rainmaker-list strong {
  color: var(--ink);
  font-weight: 700;
}

/* Footer */
.doc-footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--warm-rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--ink-soft);
  flex-wrap: wrap;
  gap: 12px;
}
.provenance-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 6px;
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  color: #475569;
  font-weight: 600;
  letter-spacing: .02em;
  transition: all .15s ease;
}
.provenance-badge:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
}
.provenance-badge.verified {
  background: #ecfdf5;
  border-color: #a7f3d0;
  color: #047857;
}
.provenance-badge.heuristic {
  background: #fef3c7;
  border-color: #fde68a;
  color: #b45309;
}

.empty {
  padding: 60px 28px;
  text-align: center;
  color: var(--ink-soft);
}
.loading-shell {
  min-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.loading-card {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 24px 28px;
  border-radius: 16px;
  background: rgba(255,255,255,.7);
  border: 1px solid rgba(0,0,0,.05);
  box-shadow: 0 12px 28px rgba(26,22,18,.06);
}
.loading-spinner {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid rgba(26,74,122,.15);
  border-top-color: var(--blue);
  animation: summary-spin .8s linear infinite;
}
.loading-copy {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--ink-mid);
}
@keyframes summary-spin {
  to { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 1100px) {
  .summary-doc {
    padding: 36px 40px 48px;
  }
  .content-grid {
    grid-template-columns: 1fr;
  }
  .content-card.featured,
  .content-card.wide {
    grid-column: 1;
  }
}
@media (max-width: 760px) {
  .summary-doc {
    padding: 28px 20px 40px;
  }
  .headline {
    font-size: 36px;
  }
  .kpi-grid {
    grid-template-columns: 1fr;
  }
  .kpi-value {
    font-size: 32px;
  }
  .kpi-card.hero .kpi-value {
    font-size: 38px;
  }
  .rainmaker-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="tab-bar">
      <a class="tab-btn active" href="https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec?page=summary" onclick="goSummary(); return false;">Summary</a>
      <a class="tab-btn" href="https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec?page=dashboard" onclick="goDashboard(); return false;">Dashboard</a>
      <a class="tab-btn" href="https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec?page=poc" onclick="goPoc(); return false;">POC Center</a>
    </div>
    <div class="topbar-title">NorthCentral Enterprise</div>
  </div>

  <div class="page">
    <div id="summaryRoot" class="empty">
      <div class="loading-shell">
        <div class="loading-card">
          <div class="loading-spinner" aria-hidden="true"></div>
          <div class="loading-copy">Loading summary…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var APP_EXEC_URL = "https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec";
var SUMMARY_DATA = <?= JSON.stringify(typeof summaryData === 'undefined' ? {} : summaryData) ?>;

function parseSummaryData(raw) {
  var x = raw;
  for (var i = 0; i < 3 && typeof x === 'string'; i++) x = JSON.parse(x);
  return x && typeof x === 'object' ? x : {};
}
function escHtml(s) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(s || '')));
  return div.innerHTML;
}
function fmtMoney(n) {
  var v = Number(n) || 0;
  return "$" + Math.round(v).toLocaleString("en-US");
}
function fmtMoneyShort(n) {
  var v = Number(n) || 0;
  if (Math.abs(v) >= 1000000) return "$" + (v / 1000000).toFixed(v % 1000000 === 0 ? 0 : 1) + "M";
  if (Math.abs(v) >= 1000) return "$" + Math.round(v / 1000) + "K";
  return "$" + Math.round(v).toLocaleString("en-US");
}
function fmtPct(n) {
  return ((Number(n) || 0) * 100).toFixed(1) + "%";
}
function fmtDateShort(isoOrDate) {
  if (!isoOrDate) return "—";
  var d = new Date(isoOrDate);
  if (isNaN(d.getTime())) return String(isoOrDate);
  return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}
function truncateText(s, maxLen) {
  var str = String(s || '').trim();
  if (!maxLen || str.length <= maxLen) return str;
  return str.slice(0, maxLen - 1).trim() + '…';
}
function takeTopItems(items, maxItems, maxLen) {
  var out = [];
  var list = items || [];
  for (var i = 0; i < list.length && out.length < maxItems; i++) {
    var item = truncateText(list[i], maxLen);
    if (String(item || '').trim()) out.push(item);
  }
  return out;
}
function renderRainmakerList_(items, formatter) {
  var html = '<ul class="rainmaker-list">';
  var list = Array.isArray(items) ? items : [];
  for (var i = 0; i < list.length; i++) {
    var line = formatter(list[i] || {});
    if (!line) continue;
    html += '<li>' + line + '</li>';
  }
  html += '</ul>';
  return html;
}
function showPageNavLoading_(label) {
  var existing = document.getElementById('pageNavLoading');
  if (existing) existing.remove();
  var overlay = document.createElement('div');
  overlay.id = 'pageNavLoading';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(250,248,245,.78);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:9999;';
  overlay.innerHTML = '<div class="loading-card"><div class="loading-spinner" aria-hidden="true"></div><div class="loading-copy">' + escHtml(label || 'Loading…') + '</div></div>';
  document.body.appendChild(overlay);
}
function goSummary() {
  showPageNavLoading_('Opening summary…');
  window.top.location.href = APP_EXEC_URL + "?page=summary&v=" + Date.now();
}
function goDashboard() {
  showPageNavLoading_('Opening dashboard…');
  window.top.location.href = APP_EXEC_URL + "?page=dashboard&v=" + Date.now();
}
function goPoc() {
  showPageNavLoading_('Opening POC Center…');
  window.top.location.href = APP_EXEC_URL + "?page=poc&v=" + Date.now();
}

function renderSummary(data) {
  var root = document.getElementById('summaryRoot');
  if (!data || !data.metrics) {
    root.innerHTML = '<div class="empty">Summary data is unavailable.</div>';
    return;
  }

  var m = data.metrics || {};
  var t = data.teamRollup || {};
  var recap = data.teamRecap || {};

  var html = '<div class="summary-doc">';

  // Header with Visual Impact
  html += '<div class="doc-header">';
  html += '<div class="doc-meta">';
  html += '<span>' + escHtml(data.teamName || 'NorthCentral Enterprise') + '</span>';
  html += '<span>' + escHtml(data.managerName || 'Billy Schuett') + '</span>';
  html += '</div>';
  html += '<h1 class="headline">' + escHtml(data.theme || 'Weekly Summary') + '</h1>';
  html += '<div class="date-line">Week of ' + escHtml(fmtDateShort(data.reportingWeek)) + ' · ' + escHtml(data.quarterLabel || data.quarterKey || '') + '</div>';
  html += '</div>';

  // KPI Cards Grid - Visual Data Viz
  html += '<div class="kpi-grid">';

  html += '<div class="kpi-card hero">';
  html += '<div class="kpi-label">Closed</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.closed)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.attainmentPct || 0)) + ' to quota</div>';
  html += '</div>';

  html += '<div class="kpi-card hero commit">';
  html += '<div class="kpi-label">Commit</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.commit)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.commitPct || 0)) + ' to quota</div>';
  html += '</div>';

  html += '<div class="kpi-card">';
  html += '<div class="kpi-label">Most Likely</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.mostLikely)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.likelyPct || 0)) + ' to quota</div>';
  html += '</div>';

  html += '<div class="kpi-card">';
  html += '<div class="kpi-label">Best Case</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.bestCase)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.bestCasePct || 0)) + ' to quota</div>';
  html += '</div>';

  html += '<div class="kpi-card">';
  html += '<div class="kpi-label">Next Quarter</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.nextQuarter)) + '</div>';
  var nextQSub = (m.nextQuarterCoverageX && m.nextQuarterCoverageX > 0)
    ? m.nextQuarterCoverageX.toFixed(1) + 'x coverage'
    : 'Pipeline';
  html += '<div class="kpi-sub">' + escHtml(nextQSub) + '</div>';
  html += '</div>';

  html += '</div>';

  // Leader Note
  if (data.leaderNote || recap.note) {
    var noteText = data.leaderNote || truncateText(recap.note, 280);
    html += '<div class="leader-note">';
    html += '<div class="leader-note-label">From ' + escHtml((data.managerName || 'Billy').split(' ')[0]) + '</div>';
    html += '<div class="leader-note-content">' + escHtml(noteText) + '</div>';
    html += '</div>';
  }

  // Content Grid
  html += '<div class="content-grid">';

  // Big Deal Adds - Featured
  var bigDeals = recap.newDealItems || [];
  if (bigDeals.length > 0) {
    html += '<div class="content-card featured">';
    html += '<div class="card-title">Big Deal Adds</div>';
    html += '<ul class="visual-list">';
    var limited = takeTopItems(bigDeals, 2, 200);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  // Deal Progression
  var dealProg = recap.dealProgressItems || [];
  if (dealProg.length > 0) {
    html += '<div class="content-card">';
    html += '<div class="card-title">Deal Progression</div>';
    html += '<ul class="visual-list">';
    var limited = takeTopItems(dealProg, 4, 170);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  // Forecast Signals
  var forecastSig = recap.forecastItems || [];
  if (forecastSig.length > 0) {
    html += '<div class="content-card">';
    html += '<div class="card-title">Forecast Signals</div>';
    html += '<ul class="visual-list">';
    var limited = takeTopItems(forecastSig, 4, 150);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  // Rep Priorities
  var priorities = (t.priorities && t.priorities.length) ? t.priorities : (recap.priorityItems || []);
  if (priorities.length > 0) {
    html += '<div class="content-card">';
    html += '<div class="card-title">Rep Priorities</div>';
    html += '<ul class="visual-list">';
    var limited = takeTopItems(priorities, 4, 165);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  // Risks, Asks, Notes
  var combinedRAN = (recap.risksAsksNotesItems && recap.risksAsksNotesItems.length)
    ? recap.risksAsksNotesItems
    : [].concat(t.risks || [], t.asks || [], t.notes || []).slice(0, 5);
  if (combinedRAN && combinedRAN.length) {
    html += '<div class="content-card">';
    html += '<div class="card-title">Risks, Asks & Notes</div>';
    html += '<ol class="visual-list numbered">';
    var limited = takeTopItems(combinedRAN, 5, 150);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ol>';
    html += '</div>';
  }

  html += '</div>'; // end content-grid

  // Rainmaker Summary
  if (data.rainmakerSummary) {
    var rm = data.rainmakerSummary;
    html += '<div class="rainmaker-section">';
    html += '<div class="card-title">Rainmaker Activity</div>';
    html += '<div class="rainmaker-grid">';

    if (rm.discovery) {
      html += '<div class="rainmaker-metric">';
      html += '<div class="rainmaker-metric-label">Discovery Meetings</div>';
      html += '<div class="rainmaker-metric-value">' + escHtml(String((rm.totals && rm.totals.discovery) || 0)) + '</div>';
      html += renderRainmakerList_(rm.discovery, function(item) {
        if (!item || !item.rep) return '';
        return '<strong>' + escHtml(item.rep) + '</strong>: ' + escHtml(String(item.count || 0));
      });
      html += '</div>';
    }

    if (rm.nbmCompleted) {
      html += '<div class="rainmaker-metric">';
      html += '<div class="rainmaker-metric-label">NBMs Completed</div>';
      html += '<div class="rainmaker-metric-value">' + escHtml(String((rm.totals && rm.totals.nbmCompleted) || 0)) + '</div>';
      html += renderRainmakerList_(rm.nbmCompleted, function(item) {
        if (!item || !item.rep) return '';
        return '<strong>' + escHtml(item.rep) + '</strong>: ' + escHtml(String(item.count || 0));
      });
      html += '</div>';
    }

    if (rm.nbmScheduled) {
      html += '<div class="rainmaker-metric">';
      html += '<div class="rainmaker-metric-label">NBMs Scheduled</div>';
      html += '<div class="rainmaker-metric-value">' + escHtml(String((rm.totals && rm.totals.nbmScheduled) || 0)) + '</div>';
      html += renderRainmakerList_(rm.nbmScheduled, function(item) {
        if (!item || !item.customer) return '';
        var rep = item.rep ? ' (' + item.rep + ')' : '';
        return '<strong>' + escHtml(item.customer) + '</strong>' + escHtml(rep);
      });
      html += '</div>';
    }

    html += '</div>';
    html += '</div>';
  }

  // Weekly Ask
  if (data.weeklyAsk) {
    html += '<div class="content-card wide">';
    html += '<div class="card-title">This Week's Ask</div>';
    html += '<div class="leader-note-content">' + escHtml(data.weeklyAsk) + '</div>';
    html += '</div>';
  }

  // Footer
  html += '<div class="doc-footer">';
  html += '<span>' + escHtml(data.footerNote || 'Confidential · Team Only') + '</span>';
  html += '<span style="display:inline-flex;gap:8px;align-items:center;">';

  var provenanceBadge = '';
  if (recap.provenance) {
    var prov = recap.provenance;
    if (prov.forecastSignalsDeterministic && prov.validationPassed) {
      provenanceBadge = '<span class="provenance-badge verified" title="Forecast signals are deterministic, AI validation passed">✓ Verified Deterministic</span>';
    } else if (prov.forecastSignalsDeterministic && !prov.aiGenerated) {
      provenanceBadge = '<span class="provenance-badge heuristic" title="Generated from heuristic analysis">Heuristic Analysis</span>';
    } else if (prov.aiGenerated && !prov.validationPassed) {
      provenanceBadge = '<span class="provenance-badge" title="AI-generated but validation incomplete">AI Partial</span>';
    }
  }

  html += provenanceBadge;
  html += '<span>' + escHtml(data.managerName || 'Billy Schuett') + '</span>';
  html += '</span>';
  html += '</div>';

  html += '</div>'; // end summary-doc

  root.innerHTML = html;
}

window.addEventListener('load', function() {
  try { renderSummary(parseSummaryData(SUMMARY_DATA)); }
  catch (e) { document.getElementById('summaryRoot').innerHTML = '<div class="empty">Summary failed to load: ' + escHtml(e.message || String(e)) + '</div>'; }
});
</script>
</body>
</html>
