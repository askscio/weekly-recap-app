<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;800&family=Space+Mono:wght@400;700&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1612;
  --ink-mid: #4a3f35;
  --ink-soft: #8a7a6e;
  --page: #faf8f5;
  --shell: #e8e2d8;
  --warm-rule: #e8e0d4;
  --red: #c0392b;
  --red-bg: #fdf2f0;
  --gold: #b8860b;
  --gold-bg: #fdfaf0;
  --green: #2d6a4f;
  --green-bg: #f0f7f4;
  --blue: #1a4a7a;
  --blue-bg: #eff6ff;
}
html { background: var(--shell); min-height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  background: var(--shell);
  line-height: 1.6;
  padding: 0;
  -webkit-font-smoothing: antialiased;
}
.shell {
  width: min(calc(100vw - 2.5in), 1840px);
  max-width: 1840px;
  min-width: 0;
  margin: 0 auto;
  padding: 8px 0 10px;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.topbar-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.tab-bar {
  display: inline-flex;
  gap: 6px;
  padding: 4px;
  border-radius: 999px;
  background: rgba(255,255,255,.55);
  border: 1px solid rgba(0,0,0,.06);
}
.tab-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 14px;
  border: none;
  background: transparent;
  border-radius: 999px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-decoration: none;
}
.tab-btn.active {
  background: var(--ink);
  color: #fff;
}
.page {
  width: 100%;
  max-width: none;
  margin: 0 auto;
  background: var(--page);
  box-shadow: 0 14px 34px rgba(26,22,18,.08);
  border: 1px solid rgba(0,0,0,.05);
  min-height: calc(100vh - 74px);
  overflow: auto;
}

/* ===== EXECUTIVE SUMMARY LAYOUT ===== */
.summary-doc {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 64px 64px;
}

/* Header */
.doc-header {
  margin-bottom: 56px;
  border-bottom: 1px solid var(--warm-rule);
  padding-bottom: 32px;
}
.doc-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.headline {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -.03em;
  color: var(--ink);
  margin-bottom: 12px;
}
.date-line {
  font-size: 13px;
  color: var(--ink-mid);
  font-weight: 500;
}

/* KPIs - Clean Sparse Row */
.kpi-row {
  display: flex;
  gap: 48px;
  margin-bottom: 64px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--warm-rule);
  flex-wrap: wrap;
}
.kpi-metric {
  flex: 0 1 auto;
  text-align: left;
}
.kpi-metric.hero {
  flex: 0 1 auto;
}
.kpi-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.kpi-value {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 4px;
}
.kpi-metric.hero .kpi-value {
  font-size: 52px;
  color: var(--green);
}
.kpi-metric.hero.commit .kpi-value {
  color: var(--blue);
}
.kpi-sub {
  font-size: 11px;
  color: var(--ink-soft);
  font-weight: 500;
}

/* Leader Note */
.leader-note {
  margin-bottom: 56px;
  padding-left: 24px;
  border-left: 4px solid var(--ink);
}
.leader-note-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 16px;
}
.leader-note-content {
  font-size: 16px;
  line-height: 1.7;
  color: var(--ink-mid);
  font-weight: 400;
}

/* Content Sections */
.content-section {
  margin-bottom: 48px;
}
.section-title {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 20px;
}
.section-title::after {
  content: '';
  display: inline-block;
  width: 32px;
  height: 2px;
  background: var(--warm-rule);
  margin-left: 16px;
  vertical-align: middle;
}

/* Lists - Clean Flow */
.content-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.content-list li {
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink-mid);
  margin-bottom: 16px;
  padding-left: 20px;
  position: relative;
}
.content-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--ink-soft);
  font-weight: 700;
}
.content-list.numbered {
  counter-reset: item;
}
.content-list.numbered li {
  padding-left: 32px;
}
.content-list.numbered li::before {
  content: counter(item) ".";
  counter-increment: item;
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  left: 0;
  width: 24px;
}

/* Featured Callout */
.featured-callout {
  background: rgba(42,106,79,.03);
  border-left: 3px solid var(--green);
  padding: 20px 24px;
  margin-bottom: 40px;
}
.featured-callout .section-title {
  margin-bottom: 16px;
}
.featured-callout .section-title::after {
  display: none;
}

/* Two-Column Layout for Dense Content */
.two-col-flow {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  margin-bottom: 48px;
}

/* Rainmaker Summary */
.rainmaker-summary {
  background: rgba(255,255,255,.4);
  padding: 32px;
  margin-bottom: 56px;
  border-radius: 8px;
}
.rainmaker-summary .section-title {
  margin-bottom: 24px;
}
.rainmaker-metrics {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
}
.rainmaker-metric {
  flex: 0 1 auto;
}
.rainmaker-metric-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.rainmaker-metric-value {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}

/* Footer */
.doc-footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--warm-rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--ink-soft);
}
.provenance-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 6px;
  background: #f1f5f9;
  border: 1px solid #cbd5e1;
  color: #475569;
  font-weight: 600;
  letter-spacing: .02em;
  text-transform: none;
  transition: all .15s ease;
}
.provenance-badge:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
}
.provenance-badge.verified {
  background: #ecfdf5;
  border-color: #a7f3d0;
  color: #047857;
}
.provenance-badge.verified:hover {
  box-shadow: 0 2px 6px rgba(4,120,87,.2);
}
.provenance-badge.heuristic {
  background: #fef3c7;
  border-color: #fde68a;
  color: #b45309;
}
.provenance-badge.heuristic:hover {
  box-shadow: 0 2px 6px rgba(180,83,9,.2);
}

.empty {
  padding: 60px 28px;
  text-align: center;
  color: var(--ink-soft);
}

/* Responsive */
@media (max-width: 1100px) {
  .summary-doc {
    padding: 40px 48px 56px;
  }
  .kpi-row {
    gap: 32px;
  }
  .two-col-flow {
    grid-template-columns: 1fr;
    gap: 32px;
  }
}
@media (max-width: 760px) {
  .summary-doc {
    padding: 32px 24px 48px;
  }
  .headline {
    font-size: 40px;
  }
  .kpi-row {
    gap: 24px;
  }
  .kpi-value {
    font-size: 32px;
  }
  .kpi-metric.hero .kpi-value {
    font-size: 40px;
  }
  .two-col-flow {
    gap: 24px;
  }
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="tab-bar">
      <a class="tab-btn active" href="https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec?page=summary" onclick="goSummary(); return false;">Summary</a>
      <a class="tab-btn" href="https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec?page=dashboard" onclick="goDashboard(); return false;">Dashboard</a>
      <a class="tab-btn" href="https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec?page=poc" onclick="goPoc(); return false;">POC Center</a>
    </div>
    <div class="topbar-title">NorthCentral Enterprise</div>
  </div>

  <div class="page">
    <div id="summaryRoot" class="empty">Loading summary…</div>
  </div>
</div>

<script>
var APP_EXEC_URL = "https://script.google.com/a/macros/glean.com/s/AKfycbxt9SVE3r4zf7PB0auoKaXODrnSWNm2p-Kh3ByoVWHw9YJzjkClEP8Shb2-embIfKJ5/exec";
var SUMMARY_DATA = <?= JSON.stringify(typeof summaryData === 'undefined' ? {} : summaryData) ?>;

function parseSummaryData(raw) {
  var x = raw;
  for (var i = 0; i < 3 && typeof x === 'string'; i++) x = JSON.parse(x);
  return x && typeof x === 'object' ? x : {};
}
function escHtml(s) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(s || '')));
  return div.innerHTML;
}
function fmtMoney(n) {
  var v = Number(n) || 0;
  return "$" + Math.round(v).toLocaleString("en-US");
}
function fmtMoneyShort(n) {
  var v = Number(n) || 0;
  if (Math.abs(v) >= 1000000) return "$" + (v / 1000000).toFixed(v % 1000000 === 0 ? 0 : 1) + "M";
  if (Math.abs(v) >= 1000) return "$" + Math.round(v / 1000) + "K";
  return "$" + Math.round(v).toLocaleString("en-US");
}
function fmtPct(n) {
  return ((Number(n) || 0) * 100).toFixed(1) + "%";
}
function fmtDateShort(isoOrDate) {
  if (!isoOrDate) return "—";
  var d = new Date(isoOrDate);
  if (isNaN(d.getTime())) return String(isoOrDate);
  return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}
function truncateText(s, maxLen) {
  var str = String(s || '').trim();
  if (!maxLen || str.length <= maxLen) return str;
  return str.slice(0, maxLen - 1).trim() + '…';
}
function takeTopItems(items, maxItems, maxLen) {
  var out = [];
  var list = items || [];
  for (var i = 0; i < list.length && out.length < maxItems; i++) {
    var item = truncateText(list[i], maxLen);
    if (String(item || '').trim()) out.push(item);
  }
  return out;
}
function goSummary() { window.top.location.href = APP_EXEC_URL + "?page=summary&v=" + Date.now(); }
function goDashboard() { window.top.location.href = APP_EXEC_URL + "?page=dashboard&v=" + Date.now(); }
function goPoc() { window.top.location.href = APP_EXEC_URL + "?page=poc&v=" + Date.now(); }

function renderSummary(data) {
  var root = document.getElementById('summaryRoot');
  if (!data || !data.metrics) {
    root.innerHTML = '<div class="empty">Summary data is unavailable.</div>';
    return;
  }

  var m = data.metrics || {};
  var t = data.teamRollup || {};
  var recap = data.teamRecap || {};

  var html = '<div class="summary-doc">';

  // Header
  html += '<div class="doc-header">';
  html += '<div class="doc-meta">';
  html += '<span>' + escHtml(data.teamName || 'NorthCentral Enterprise') + '</span>';
  html += '<span>' + escHtml(data.managerName || 'Billy Schuett') + '</span>';
  html += '</div>';
  html += '<h1 class="headline">' + escHtml(data.theme || 'Weekly Summary') + '</h1>';
  html += '<div class="date-line">Week of ' + escHtml(fmtDateShort(data.reportingWeek)) + ' · ' + escHtml(data.quarterLabel || data.quarterKey || '') + '</div>';
  html += '</div>';

  // KPI Row - Clean Sparse Layout
  html += '<div class="kpi-row">';

  // Hero metrics first
  html += '<div class="kpi-metric hero">';
  html += '<div class="kpi-label">Closed</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.closed)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.attainmentPct || 0)) + ' to quota</div>';
  html += '</div>';

  html += '<div class="kpi-metric hero commit">';
  html += '<div class="kpi-label">Commit</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.commit)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.commitPct || 0)) + ' to quota</div>';
  html += '</div>';

  // Supporting metrics
  html += '<div class="kpi-metric">';
  html += '<div class="kpi-label">Most Likely</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.mostLikely)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.likelyPct || 0)) + ' to quota</div>';
  html += '</div>';

  html += '<div class="kpi-metric">';
  html += '<div class="kpi-label">Best Case</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.bestCase)) + '</div>';
  html += '<div class="kpi-sub">' + escHtml(fmtPct(m.bestCasePct || 0)) + ' to quota</div>';
  html += '</div>';

  html += '<div class="kpi-metric">';
  html += '<div class="kpi-label">Next Quarter</div>';
  html += '<div class="kpi-value">' + escHtml(fmtMoneyShort(m.nextQuarter)) + '</div>';
  var nextQSub = (m.nextQuarterCoverageX && m.nextQuarterCoverageX > 0)
    ? m.nextQuarterCoverageX.toFixed(1) + 'x coverage'
    : 'Pipeline';
  html += '<div class="kpi-sub">' + escHtml(nextQSub) + '</div>';
  html += '</div>';

  html += '</div>';

  // Leader Note
  if (data.leaderNote || recap.note) {
    var noteText = data.leaderNote || truncateText(recap.note, 280);
    html += '<div class="leader-note">';
    html += '<div class="leader-note-label">From ' + escHtml((data.managerName || 'Billy').split(' ')[0]) + '</div>';
    html += '<div class="leader-note-content">' + escHtml(noteText) + '</div>';
    html += '</div>';
  }

  // Big Deal Adds - Featured Callout
  var bigDeals = recap.newDealItems || [];
  if (bigDeals.length > 0) {
    html += '<div class="featured-callout">';
    html += '<div class="section-title">Big Deal Adds</div>';
    html += '<ul class="content-list">';
    var limited = takeTopItems(bigDeals, 2, 200);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  // Two-Column Content Flow
  html += '<div class="two-col-flow">';

  // Left Column
  html += '<div>';

  // Deal Progression
  var dealProg = recap.dealProgressItems || [];
  if (dealProg.length > 0) {
    html += '<div class="content-section">';
    html += '<div class="section-title">Deal Progression</div>';
    html += '<ul class="content-list">';
    var limited = takeTopItems(dealProg, 4, 170);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  // Forecast Signals
  var forecastSig = recap.forecastItems || [];
  if (forecastSig.length > 0) {
    html += '<div class="content-section">';
    html += '<div class="section-title">Forecast Signals</div>';
    html += '<ul class="content-list">';
    var limited = takeTopItems(forecastSig, 4, 150);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  html += '</div>';

  // Right Column
  html += '<div>';

  // Rep Priorities
  var priorities = (t.priorities && t.priorities.length) ? t.priorities : (recap.priorityItems || []);
  if (priorities.length > 0) {
    html += '<div class="content-section">';
    html += '<div class="section-title">Rep Priorities</div>';
    html += '<ul class="content-list">';
    var limited = takeTopItems(priorities, 4, 165);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ul>';
    html += '</div>';
  }

  // Risks, Asks, Notes
  var combinedRAN = (recap.risksAsksNotesItems && recap.risksAsksNotesItems.length)
    ? recap.risksAsksNotesItems
    : [].concat(t.risks || [], t.asks || [], t.notes || []).slice(0, 5);
  if (combinedRAN && combinedRAN.length) {
    html += '<div class="content-section">';
    html += '<div class="section-title">Risks, Asks & Notes</div>';
    html += '<ol class="content-list numbered">';
    var limited = takeTopItems(combinedRAN, 5, 150);
    for (var i = 0; i < limited.length; i++) {
      html += '<li>' + escHtml(limited[i]) + '</li>';
    }
    html += '</ol>';
    html += '</div>';
  }

  html += '</div>';
  html += '</div>'; // end two-col-flow

  // Rainmaker Summary (if exists)
  if (data.rainmakerSummary) {
    var rm = data.rainmakerSummary;
    html += '<div class="rainmaker-summary">';
    html += '<div class="section-title">Rainmaker Activity</div>';
    html += '<div class="rainmaker-metrics">';

    if (rm.disco) {
      html += '<div class="rainmaker-metric">';
      html += '<div class="rainmaker-metric-label">Discovery Meetings</div>';
      html += '<div class="rainmaker-metric-value">' + escHtml(String(rm.disco.totalCompleted || 0)) + '</div>';
      html += '</div>';
    }

    if (rm.nbm) {
      html += '<div class="rainmaker-metric">';
      html += '<div class="rainmaker-metric-label">NBMs Completed</div>';
      html += '<div class="rainmaker-metric-value">' + escHtml(String(rm.nbm.totalCompleted || 0)) + '</div>';
      html += '</div>';

      html += '<div class="rainmaker-metric">';
      html += '<div class="rainmaker-metric-label">NBMs Scheduled</div>';
      html += '<div class="rainmaker-metric-value">' + escHtml(String(rm.nbm.totalScheduled || 0)) + '</div>';
      html += '</div>';
    }

    html += '</div>';
    html += '</div>';
  }

  // Weekly Ask (if exists)
  if (data.weeklyAsk) {
    html += '<div class="content-section">';
    html += '<div class="section-title">This Week's Ask</div>';
    html += '<div class="leader-note-content">' + escHtml(data.weeklyAsk) + '</div>';
    html += '</div>';
  }

  // Footer with Provenance
  html += '<div class="doc-footer">';
  html += '<span>' + escHtml(data.footerNote || 'Confidential · Team Only') + '</span>';
  html += '<span style="display:inline-flex;gap:8px;align-items:center;">';

  var provenanceBadge = '';
  if (recap.provenance) {
    var prov = recap.provenance;
    if (prov.forecastSignalsDeterministic && prov.validationPassed) {
      provenanceBadge = '<span class="provenance-badge verified" title="Forecast signals are deterministic, AI validation passed">✓ Verified Deterministic</span>';
    } else if (prov.forecastSignalsDeterministic && !prov.aiGenerated) {
      provenanceBadge = '<span class="provenance-badge heuristic" title="Generated from heuristic analysis">Heuristic Analysis</span>';
    } else if (prov.aiGenerated && !prov.validationPassed) {
      provenanceBadge = '<span class="provenance-badge" title="AI-generated but validation incomplete">AI Partial</span>';
    }
  }

  html += provenanceBadge;
  html += '<span>' + escHtml(data.managerName || 'Billy Schuett') + '</span>';
  html += '</span>';
  html += '</div>';

  html += '</div>'; // end summary-doc

  root.innerHTML = html;
}

window.addEventListener('load', function() {
  try { renderSummary(parseSummaryData(SUMMARY_DATA)); }
  catch (e) { document.getElementById('summaryRoot').innerHTML = '<div class="empty">Summary failed to load: ' + escHtml(e.message || String(e)) + '</div>'; }
});
</script>
</body>
</html>
